<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" role="img" aria-label="Build-time flow">
<style>
  svg{--blue-fill:#E6F1FB;--blue-stroke:#185FA5;--blue-title:#0C447C;--blue-sub:#185FA5;--green-fill:#EAF3DE;--green-stroke:#3B6D11;--green-title:#27500A;--green-sub:#3B6D11;--arrow:#888780;--ink:#2A2926;--ink-soft:#5F5E5A}
  @media (prefers-color-scheme:dark){svg{--blue-fill:#0C447C;--blue-stroke:#85B7EB;--blue-title:#B5D4F4;--blue-sub:#85B7EB;--green-fill:#27500A;--green-stroke:#97C459;--green-title:#C0DD97;--green-sub:#97C459;--arrow:#B4B2A9;--ink:#F1EFE8;--ink-soft:#B4B2A9}}
  text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  .th{font-weight:600;font-size:15px}.ts{font-weight:400;font-size:12px}
  .lbl{font-weight:400;font-size:12px;fill:var(--ink-soft)}.legtxt{font-weight:500;font-size:12px;fill:var(--ink)}
  .arr{stroke:var(--arrow);stroke-width:1.5;fill:none}
  .n-blue rect{fill:var(--blue-fill);stroke:var(--blue-stroke);stroke-width:1}.n-blue .th{fill:var(--blue-title)}.n-blue .ts{fill:var(--blue-sub)}
  .n-green rect{fill:var(--green-fill);stroke:var(--green-stroke);stroke-width:1}.n-green .th{fill:var(--green-title)}.n-green .ts{fill:var(--green-sub)}
</style>
<defs><marker id="arrowB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="n-blue"><rect x="206" y="15" width="13" height="13" rx="3"/></g>
<text class="legtxt" x="224" y="21" dominant-baseline="central">Embeddable</text>
<g class="n-green"><rect x="360" y="15" width="13" height="13" rx="3"/></g>
<text class="legtxt" x="378" y="21" dominant-baseline="central">Your code &amp; data</text>
<g class="n-green">
  <rect x="130" y="50" width="420" height="64" rx="8"/>
  <text class="th" x="340" y="74" text-anchor="middle" dominant-baseline="central">Your repo</text>
  <text class="ts" x="340" y="96" text-anchor="middle" dominant-baseline="central">Models &#183; components &#183; dashboards</text>
</g>
<line x1="340" y1="114" x2="340" y2="142" class="arr" marker-end="url(#arrowB)"/>
<text class="lbl" x="352" y="128" dominant-baseline="central">push via CLI</text>
<g class="n-blue">
  <rect x="130" y="150" width="420" height="64" rx="8"/>
  <text class="th" x="340" y="174" text-anchor="middle" dominant-baseline="central">Embeddable platform</text>
  <text class="ts" x="340" y="196" text-anchor="middle" dominant-baseline="central">Your assets + no-code builder</text>
</g>
<line x1="340" y1="214" x2="340" y2="242" class="arr" marker-end="url(#arrowB)"/>
<text class="lbl" x="352" y="228" dominant-baseline="central">build &#183; save &#183; publish</text>
<g class="n-blue">
  <rect x="130" y="250" width="420" height="64" rx="8"/>
  <text class="th" x="340" y="274" text-anchor="middle" dominant-baseline="central">Published version</text>
  <text class="ts" x="340" y="296" text-anchor="middle" dominant-baseline="central">What gets embedded</text>
</g>
</svg>
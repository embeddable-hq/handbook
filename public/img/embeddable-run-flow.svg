<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 576" role="img" aria-label="Run-time flow">
<style>
  svg{--blue-fill:#E6F1FB;--blue-stroke:#185FA5;--blue-title:#0C447C;--blue-sub:#185FA5;--green-fill:#EAF3DE;--green-stroke:#3B6D11;--green-title:#27500A;--green-sub:#3B6D11;--arrow:#888780;--ink:#2A2926;--ink-soft:#5F5E5A}
  @media (prefers-color-scheme:dark){svg{--blue-fill:#0C447C;--blue-stroke:#85B7EB;--blue-title:#B5D4F4;--blue-sub:#85B7EB;--green-fill:#27500A;--green-stroke:#97C459;--green-title:#C0DD97;--green-sub:#97C459;--arrow:#B4B2A9;--ink:#F1EFE8;--ink-soft:#B4B2A9}}
  text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  .th{font-weight:600;font-size:15px}.ts{font-weight:400;font-size:12px}
  .lbl{font-weight:400;font-size:12px;fill:var(--ink-soft)}.legtxt{font-weight:500;font-size:12px;fill:var(--ink)}
  .arr{stroke:var(--arrow);stroke-width:1.5;fill:none}
  .n-blue rect{fill:var(--blue-fill);stroke:var(--blue-stroke);stroke-width:1}.n-blue .th{fill:var(--blue-title)}.n-blue .ts{fill:var(--blue-sub)}
  .n-green rect{fill:var(--green-fill);stroke:var(--green-stroke);stroke-width:1}.n-green .th{fill:var(--green-title)}.n-green .ts{fill:var(--green-sub)}
</style>
<defs><marker id="arrowR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g class="n-blue">
  <rect x="130" y="30" width="420" height="56" rx="8"/>
  <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Web component</text>
  <text class="ts" x="340" y="69" text-anchor="middle" dominant-baseline="central">On your website</text>
</g>
<line x1="340" y1="86" x2="340" y2="116" class="arr" marker-end="url(#arrowR)"/>
<text class="lbl" x="352" y="101" dominant-baseline="central">loads data</text>
<g class="n-blue">
  <rect x="130" y="124" width="420" height="56" rx="8"/>
  <text class="th" x="340" y="144" text-anchor="middle" dominant-baseline="central">Embeddable data service</text>
  <text class="ts" x="340" y="163" text-anchor="middle" dominant-baseline="central">Semantic layer generates SQL</text>
</g>
<line x1="340" y1="180" x2="340" y2="210" class="arr" marker-end="url(#arrowR)"/>
<g class="n-blue">
  <rect x="130" y="218" width="420" height="56" rx="8"/>
  <text class="th" x="340" y="238" text-anchor="middle" dominant-baseline="central">L1 cache</text>
  <text class="ts" x="340" y="257" text-anchor="middle" dominant-baseline="central">Standard request cache</text>
</g>
<line x1="340" y1="274" x2="340" y2="304" class="arr" marker-end="url(#arrowR)"/>
<g class="n-blue">
  <rect x="130" y="312" width="420" height="56" rx="8"/>
  <text class="th" x="340" y="332" text-anchor="middle" dominant-baseline="central">Row-level security</text>
  <text class="ts" x="340" y="351" text-anchor="middle" dominant-baseline="central">Filters rows per user</text>
</g>
<line x1="340" y1="368" x2="340" y2="398" class="arr" marker-end="url(#arrowR)"/>
<g class="n-blue">
  <rect x="130" y="406" width="420" height="56" rx="8"/>
  <text class="th" x="340" y="426" text-anchor="middle" dominant-baseline="central">L2 cache</text>
  <text class="ts" x="340" y="445" text-anchor="middle" dominant-baseline="central">Indexes &amp; materialized views</text>
</g>
<line x1="340" y1="462" x2="340" y2="492" class="arr" marker-end="url(#arrowR)"/>
<g class="n-green">
  <rect x="130" y="500" width="420" height="56" rx="8"/>
  <text class="th" x="340" y="520" text-anchor="middle" dominant-baseline="central">Your database(s)</text>
  <text class="ts" x="340" y="539" text-anchor="middle" dominant-baseline="central">Your existing data sources</text>
</g>
</svg>